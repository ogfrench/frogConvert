<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <script>
    var t = localStorage.getItem("theme");
    if (t === "dark" || (!t && !window.matchMedia("(prefers-color-scheme: light)").matches)) {
      document.documentElement.classList.add("dark");
    }
    document.documentElement.style.visibility = 'hidden';
    document.documentElement.style.opacity = '0';
    document.documentElement.style.transition = 'opacity 0.25s ease';
    window.addEventListener('DOMContentLoaded', function () {
      document.documentElement.style.visibility = 'visible';
      document.documentElement.style.opacity = '1';
    });
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    as="style">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  </noscript>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>404 - Page Not Found · frogConvert</title>

  <style>
    /* Design tokens */
    :root {
      --background: #ffffff;
      --foreground: #0a0a0a;
      --primary: #0a0a0a;
      --primary-foreground: #fafafa;
      --secondary: #f4f4f5;
      --muted-foreground: #71717a;
      --border: #e4e4e7;
      --radius: 0.5rem;
      --blur-bg-visual: blur(12px);
      --opacity-bg-visual: 0.22;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: light;
    }

    .dark {
      --background: #0a0a0a;
      --foreground: #fafafa;
      --primary: #fafafa;
      --primary-foreground: #0a0a0a;
      --secondary: #27272a;
      --muted-foreground: #a1a1aa;
      --border: #27272a;
      color-scheme: dark;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans);
      background-color: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Header */
    .page-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.5rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--foreground);
      font-weight: 600;
      font-size: 0.9375rem;
      letter-spacing: -0.01em;
    }

    .logo-emoji {
      display: inline-block;
      font-size: 1.25rem;
      transition: transform 0.3s ease;
    }

    .logo:hover .logo-emoji {
      transform: scale(1.1) rotate(5deg);
    }

    /* Main content */
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 5rem 1.5rem 2rem;
      max-width: 480px;
      position: relative;
      z-index: 2;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .frog-emoji {
      font-size: 5rem;
      display: inline-block;
      animation: hop 3s ease-in-out infinite;
      margin-bottom: 1.5rem;
      user-select: none;
      line-height: 1;
    }

    .frog-emoji-img { height: 1.1em; width: auto; display: block; }

    .error-code {
      font-size: clamp(4rem, 15vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 0 0 0.75rem;
    }

    .error-title {
      font-size: clamp(1.125rem, 4vw, 1.375rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.625rem;
    }

    .error-body {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      line-height: 1.6;
      margin: 0 0 2rem;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      background-color: var(--primary);
      color: var(--primary-foreground);
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: opacity 0.2s ease, transform 0.1s ease;
    }

    .btn-home:hover { opacity: 0.9; }
    .btn-home:active { transform: scale(0.98); }

    /* Background floating emojis */
    #bg-visuals {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    @media (max-width: 800px) {
      #bg-visuals { display: none; }
    }

    .bg-pop {
      position: absolute;
      opacity: 0;
      animation: bgVisualEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    #bg-visuals span {
      display: inline-block;
      opacity: var(--opacity-bg-visual);
      filter: var(--blur-bg-visual);
      animation: float 20s ease-in-out infinite;
      user-select: none;
    }

    /* Keyframes */
    @keyframes hop {
      0%        { transform: translateY(0) scale(1, 1); }
      8%        { transform: translateY(5px) scale(1.1, 0.88); }
      25%       { transform: translateY(-40px) scale(0.9, 1.12); }
      45%       { transform: translateY(-44px) scale(0.88, 1.15); }
      62%       { transform: translateY(0) scale(1.12, 0.9); }
      72%       { transform: translateY(-10px) scale(0.96, 1.04); }
      82%       { transform: translateY(0) scale(1.04, 0.97); }
      90%, 100% { transform: translateY(0) scale(1, 1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-30px) rotate(5deg); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes bgVisualEntrance {
      from { opacity: 0; transform: scale(0.6) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>

<body>

  <div id="bg-visuals" aria-hidden="true">
    <div class="bg-pop" style="top:12%;left:5%;animation-delay:0.125s;"><span style="font-size:2.8rem;animation-delay:0s;">🖼️</span></div>
    <div class="bg-pop" style="top:25%;right:15%;animation-delay:0.25s;"><span style="font-size:3.5rem;animation-delay:-5s;">📝</span></div>
    <div class="bg-pop" style="top:65%;left:10%;animation-delay:0.375s;"><span style="font-size:3.5rem;animation-delay:-10s;">🎵</span></div>
    <div class="bg-pop" style="top:55%;right:8%;animation-delay:0.5s;"><span style="font-size:4rem;animation-delay:-3s;">🎥</span></div>
    <div class="bg-pop" style="top:80%;right:20%;animation-delay:0.625s;"><span style="font-size:3rem;animation-delay:-8s;">📖</span></div>
    <div class="bg-pop" style="top:35%;left:18%;animation-delay:0.750s;"><span style="font-size:3.5rem;animation-delay:-13s;">📊</span></div>
    <div class="bg-pop" style="top:10%;left:40%;animation-delay:0.875s;"><span style="font-size:3.5rem;animation-delay:-17s;">🔠</span></div>
    <div class="bg-pop" style="top:85%;left:45%;animation-delay:1.8s;"><span style="font-size:3.5rem;animation-delay:-20s;">💻</span></div>
    <div class="bg-pop" style="top:5%;right:35%;animation-delay:1.125s;"><span style="font-size:3rem;animation-delay:-7s;">⚡</span></div>
  </div>

  <header class="page-header">
    <a href="/convert/" class="logo" aria-label="frogConvert home">
      <span class="logo-emoji" aria-hidden="true"><img src="/frog-emoji.webp" alt="" class="frog-emoji-img"></span>
      <span>frogConvert</span>
    </a>
  </header>

  <main class="error-page" role="main">
    <div class="frog-emoji" aria-hidden="true"><img src="/frog-emoji.webp" alt="" class="frog-emoji-img"></div>
    <p class="error-code" aria-label="Error 404">404</p>
    <h1 class="error-title">Ribbit! This page hopped away.</h1>
    <p class="error-body">The URL you're looking for doesn't exist. Maybe the frog ate it.</p>
    <a href="/convert/" class="btn-home">
      <span aria-hidden="true">&#8592;</span> Back to frogConvert
    </a>
  </main>

</body>

</html>
