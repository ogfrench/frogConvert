<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>frogConvert Docs</title>
  <meta name="description" content="Documentation for frogConvert — fast, private in-browser file conversion.">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">

  <script>
    var t = localStorage.getItem("theme");
    if (t === "dark" || (!t && !window.matchMedia("(prefers-color-scheme: light)").matches)) {
      document.documentElement.classList.add("dark");
    }
    document.documentElement.style.visibility = 'hidden';
    document.documentElement.style.opacity = '0';
    document.documentElement.style.transition = 'opacity 0.25s ease';
    window.addEventListener('DOMContentLoaded', function () {
      document.documentElement.style.visibility = 'visible';
      document.documentElement.style.opacity = '1';
    });
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"
    media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"></noscript>

  <!-- marked + highlight.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" id="hljs-light">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" id="hljs-dark" disabled>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    /* ── Design tokens (mirrors global.css) ── */
    :root {
      --background: #ffffff;
      --foreground: #0a0a0a;
      --card: #ffffff;
      --card-foreground: #0a0a0a;
      --primary: #0a0a0a;
      --primary-foreground: #fafafa;
      --secondary: #f4f4f5;
      --secondary-foreground: #18181b;
      --muted: #f4f4f5;
      --muted-foreground: #71717a;
      --accent: #e4e4e7;
      --border: #e4e4e7;
      --ring: #a1a1aa;
      --top-bar-bg: rgba(255,255,255,0.85);
      --radius: 0.5rem;
      --radius-sm: 0.375rem;
      --radius-xl: 1.25rem;
      --radius-full: 9999px;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -2px rgba(0,0,0,.1);
      --sidebar-w: 240px;
      --topbar-h: 56px;
      color-scheme: light;
    }
    .dark {
      --background: #0a0a0a;
      --foreground: #fafafa;
      --card: #141414;
      --card-foreground: #fafafa;
      --primary: #fafafa;
      --primary-foreground: #0a0a0a;
      --secondary: #27272a;
      --secondary-foreground: #fafafa;
      --muted: #27272a;
      --muted-foreground: #a1a1aa;
      --accent: #3f3f46;
      --border: #27272a;
      --ring: #52525b;
      --top-bar-bg: rgba(10,10,10,0.85);
      color-scheme: dark;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      height: 100%;
      font-family: var(--font-sans);
      background-color: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    * { scrollbar-width: thin; scrollbar-color: rgba(128,128,128,.3) transparent; }
    *::-webkit-scrollbar { width: 5px; height: 5px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: rgba(128,128,128,.3); border-radius: 99px; }

    /* ── Top Bar ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem;
      background-color: var(--top-bar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      transition: background-color .3s ease, border-color .3s ease;
    }

    #topbar-left { display: flex; align-items: center; gap: .75rem; }

    #logo {
      display: flex; align-items: center; gap: .35rem;
      text-decoration: none; color: var(--foreground);
      font-weight: 700; font-size: .9375rem;
      transition: opacity .15s ease;
    }
    #logo:hover { opacity: .75; }

    .logo-emoji { font-size: 1.1rem; line-height: 1; transition: transform .2s ease; }
    .frog-emoji-img { height: 1.1em; width: auto; display: block; }
    #logo:hover .logo-emoji { transform: scale(1.1) rotate(5deg); }

    .docs-badge {
      font-size: .6875rem; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase;
      padding: .2rem .55rem;
      background-color: var(--secondary);
      color: var(--muted-foreground);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
    }

    #topbar-right { display: flex; align-items: center; gap: .5rem; }

    .topbar-btn {
      display: flex; align-items: center; gap: .35rem;
      height: 2rem; padding: 0 .75rem;
      font-family: inherit; font-size: .75rem; font-weight: 500;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background-color: var(--secondary);
      color: var(--foreground);
      cursor: pointer; text-decoration: none;
      transition: background-color .15s ease, border-color .15s ease;
    }
    .topbar-btn:hover { background-color: var(--accent); border-color: var(--ring); }

    #theme-toggle {
      width: 2rem; height: 2rem; padding: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background-color: var(--secondary);
      color: var(--foreground);
      cursor: pointer;
      transition: background-color .15s ease;
    }
    #theme-toggle:hover { background-color: var(--accent); }

    /* ── Mobile nav toggle ── */
    #nav-toggle {
      display: none;
      width: 2rem; height: 2rem; padding: 0;
      flex-direction: column; justify-content: center; align-items: center; gap: 4px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background-color: var(--secondary); cursor: pointer;
      transition: background-color .15s ease;
    }
    #nav-toggle:hover { background-color: var(--accent); }
    #nav-toggle span {
      width: 14px; height: 1.5px;
      background-color: var(--foreground); border-radius: 2px;
      transition: transform .25s ease, opacity .25s ease;
    }

    /* ── Layout ── */
    #layout {
      display: flex;
      padding-top: var(--topbar-h);
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed;
      top: var(--topbar-h); bottom: 0; left: 0;
      width: var(--sidebar-w);
      overflow-y: auto;
      padding: 1.5rem 0 2rem;
      border-right: 1px solid var(--border);
      background-color: var(--background);
      transition: background-color .3s ease, border-color .3s ease, transform .25s ease;
      z-index: 50;
    }

    .sidebar-section-label {
      padding: 0 1rem .5rem;
      font-size: .6875rem; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--muted-foreground);
    }

    .nav-item {
      display: flex; align-items: center; gap: .5rem;
      width: 100%; padding: .45rem 1rem;
      font-family: inherit; font-size: .8125rem; font-weight: 500;
      color: var(--muted-foreground);
      background: none; border: none; cursor: pointer; text-align: left;
      border-radius: 0;
      transition: color .15s ease, background-color .15s ease;
      text-decoration: none;
      position: relative;
    }
    .nav-item:hover { color: var(--foreground); background-color: var(--secondary); }
    .nav-item.active {
      color: var(--foreground); font-weight: 600;
      background-color: var(--accent);
    }
    .nav-item.active::before {
      content: "";
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 2px; border-radius: 2px;
      background-color: var(--primary);
    }
    .nav-icon { font-size: .9rem; flex-shrink: 0; }
    .nav-desc {
      display: block; margin-top: .1rem;
      font-size: .6875rem; font-weight: 400;
      color: var(--muted-foreground); opacity: .8;
    }

    /* ── Content ── */
    #content {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 2.5rem 3rem 4rem;
      max-width: 860px;
      min-width: 0;
    }

    /* ── Loading / Error state ── */
    #doc-placeholder {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 40vh;
      color: var(--muted-foreground);
      font-size: .875rem; gap: .75rem;
    }
    .spinner {
      width: 1.5rem; height: 1.5rem;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Rendered Markdown ── */
    #doc-body {
      font-size: .9375rem;
      line-height: 1.75;
      color: var(--foreground);
    }

    #doc-body h1 {
      font-size: 1.875rem; font-weight: 700;
      letter-spacing: -.03em; margin: 0 0 .5rem;
      line-height: 1.2;
      padding-bottom: .75rem;
      border-bottom: 1px solid var(--border);
    }
    #doc-body h2 {
      font-size: 1.25rem; font-weight: 600;
      letter-spacing: -.02em; margin: 2.5rem 0 .75rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }
    #doc-body h3 {
      font-size: 1.0625rem; font-weight: 600;
      margin: 1.75rem 0 .5rem;
    }
    #doc-body h4 {
      font-size: .9375rem; font-weight: 600;
      margin: 1.25rem 0 .4rem;
    }
    #doc-body p { margin: .9rem 0; }
    #doc-body ul, #doc-body ol {
      padding-left: 1.5rem; margin: .75rem 0;
    }
    #doc-body li { margin: .3rem 0; }
    #doc-body li > ul, #doc-body li > ol { margin: .25rem 0; }

    #doc-body a {
      color: var(--foreground);
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 2px;
      transition: text-decoration-color .15s ease;
    }
    #doc-body a:hover { text-decoration-color: var(--foreground); }

    #doc-body strong { font-weight: 600; }
    #doc-body em { font-style: italic; }

    #doc-body hr {
      border: none; border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    #doc-body blockquote {
      margin: 1rem 0; padding: .75rem 1rem;
      border-left: 3px solid var(--border);
      background-color: var(--secondary);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--muted-foreground);
    }
    #doc-body blockquote p { margin: 0; }

    /* Inline code */
    #doc-body :not(pre) > code {
      font-family: var(--font-mono);
      font-size: .8125rem;
      padding: .15em .4em;
      background-color: var(--secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--foreground);
    }

    /* Code blocks */
    #doc-body pre {
      margin: 1.25rem 0;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    #doc-body pre code {
      display: block;
      padding: 1rem 1.25rem !important;
      font-family: var(--font-mono) !important;
      font-size: .8125rem !important;
      line-height: 1.65 !important;
      overflow-x: auto;
      background: transparent !important;
      border: none !important;
    }
    /* Wrap hljs backgrounds into border */
    #doc-body pre > .hljs {
      border-radius: calc(var(--radius) - 1px);
    }

    /* Tables */
    #doc-body table {
      width: 100%; border-collapse: collapse;
      font-size: .875rem; margin: 1.25rem 0;
    }
    #doc-body th {
      padding: .5rem .75rem; text-align: left;
      font-weight: 600; font-size: .75rem;
      letter-spacing: .04em; text-transform: uppercase;
      color: var(--muted-foreground);
      border-bottom: 2px solid var(--border);
    }
    #doc-body td {
      padding: .5rem .75rem;
      border-bottom: 1px solid var(--border);
    }
    #doc-body tr:last-child td { border-bottom: none; }
    #doc-body tr:hover td { background-color: var(--secondary); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .logo-text { display: none; }
    }

    @media (max-width: 400px) {
      a.topbar-btn[href*="github"] { display: none; }
    }

    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }

      #sidebar {
        width: 240px;
        transform: translateX(-100%);
        box-shadow: var(--shadow-md);
      }
      #sidebar.open { transform: translateX(0); }

      #nav-toggle { display: flex; }

      #content {
        margin-left: 0;
        padding: 1.75rem 1.25rem 3rem;
      }

      #doc-body h1 { font-size: 1.5rem; }
      #doc-body h2 { font-size: 1.125rem; }
    }

    @media (max-width: 480px) {
      #content { padding: 1.5rem 1rem 3rem; }
    }

    /* Overlay for mobile sidebar */
    #sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 49;
    }
    #sidebar-overlay.visible { display: block; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <header id="topbar">
    <div id="topbar-left">
      <button id="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <a id="logo" href="../" aria-label="frogConvert home">
        <span class="logo-emoji"><img src="../frog-emoji.webp" alt="" class="frog-emoji-img"></span>
        <span class="logo-text">frogConvert</span>
      </a>
      <span class="docs-badge">Docs</span>
    </div>
    <div id="topbar-right">
      <a class="topbar-btn" href="../">
        ← App
      </a>
      <a class="topbar-btn" href="https://github.com/ogfrench/frogConvert" target="_blank" rel="noopener" aria-label="GitHub repository">
        GitHub
      </a>
      <button id="theme-toggle" aria-label="Toggle theme">&#9790;</button>
    </div>
  </header>

  <div id="sidebar-overlay"></div>

  <div id="layout">
    <!-- Sidebar -->
    <nav id="sidebar" aria-label="Documentation navigation">
      <div class="sidebar-section-label">Documentation</div>

      <button class="nav-item" data-doc="README.md">
        <span class="nav-icon">📖</span>
        <span>
          README
          <span class="nav-desc">Setup &amp; contributing</span>
        </span>
      </button>

      <button class="nav-item" data-doc="AGENTS.md">
        <span class="nav-icon">🤖</span>
        <span>
          AGENTS
          <span class="nav-desc">MCP &amp; REST API guide</span>
        </span>
      </button>

      <button class="nav-item" data-doc="AGENT_CONTEXT.md">
        <span class="nav-icon">⚙️</span>
        <span>
          Agent Context
          <span class="nav-desc">Architecture deep-dive</span>
        </span>
      </button>
    </nav>

    <!-- Main content -->
    <main id="content">
      <div id="doc-placeholder">
        <div class="spinner"></div>
        <span>Loading…</span>
      </div>
      <div id="doc-body" style="display:none"></div>
    </main>
  </div>

  <script>
    // ── Theme ──
    const html = document.documentElement;
    const themeBtn = document.getElementById('theme-toggle');
    function isDark() { return html.classList.contains('dark'); }
    function applyTheme(dark) {
      html.classList.toggle('dark', dark);
      themeBtn.innerHTML = dark ? '&#9788;' : '&#9790;';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      document.getElementById('hljs-light').disabled = dark;
      document.getElementById('hljs-dark').disabled = !dark;
    }
    applyTheme(isDark());
    themeBtn.addEventListener('click', () => applyTheme(!isDark()));

    // ── Sidebar toggle (mobile) ──
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const navToggle = document.getElementById('nav-toggle');
    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('visible'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); }
    navToggle.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
    overlay.addEventListener('click', closeSidebar);

    marked.setOptions({ gfm: true, breaks: false });

    // ── Doc loader ──
    const placeholder = document.getElementById('doc-placeholder');
    const docBody = document.getElementById('doc-body');
    let activeBtn = null;

    async function loadDoc(filename) {
      // Update nav active state
      document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
      const btn = document.querySelector(`[data-doc="${filename}"]`);
      if (btn) btn.classList.add('active');
      activeBtn = filename;

      // Show loading
      placeholder.innerHTML = '<div class="spinner"></div><span>Loading…</span>';
      placeholder.style.display = 'flex';
      docBody.style.display = 'none';

      try {
        const res = await fetch(`./${filename}`);
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        const md = await res.text();
        const html = await marked.parse(md);
        docBody.innerHTML = html;

        // Open external links in new tab
        docBody.querySelectorAll('a[href^="http://"], a[href^="https://"]').forEach(a => {
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener');
        });

        // Syntax highlight
        if (window.hljs) {
          docBody.querySelectorAll('pre code').forEach(el => {
            hljs.highlightElement(el);
          });
        }

        placeholder.style.display = 'none';
        docBody.style.display = 'block';
        window.scrollTo({ top: 0 });

        // Update URL hash
        history.replaceState(null, '', `#${filename}`);
      } catch (err) {
        placeholder.innerHTML = `<span>⚠️ Failed to load ${filename}</span><span style="font-size:.75rem;color:var(--muted-foreground)">${err.message}</span>`;
      }

      // Auto-close sidebar on mobile
      if (window.innerWidth <= 768) closeSidebar();
    }

    // Wire up nav buttons
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => loadDoc(btn.dataset.doc));
    });

    // Load doc from hash or default to README
    const hash = location.hash.replace('#', '');
    const validDocs = ['README.md', 'AGENTS.md', 'AGENT_CONTEXT.md'];
    loadDoc(validDocs.includes(hash) ? hash : 'README.md');
  </script>
</body>
</html>
