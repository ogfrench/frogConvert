[build]
  command = "bun run build && (bun x puppeteer browsers install chrome && bun run cache:build || echo 'Warning: cache build failed, deploying without cache.json')"
  publish = "dist"

# Rewrite /convert/* to the actual files in dist/
# This is needed because Vite generates asset URLs prefixed with /convert/
# but Netlify serves the dist folder at the root.
[[redirects]]
  from = "/convert/*"
  to = "/:splat"
  status = 200

# Redirect root to /convert/
[[redirects]]
  from = "/"
  to = "/convert/"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
